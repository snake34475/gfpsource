<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GFP 协议测试面板</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #ddd; }
        h1 { color: #4af; }
        .section { margin: 15px 0; padding: 10px; border: 1px solid #333; background: #2d2d2d; }
        .section h2 { margin: 0 0 10px 0; color: #f90; }
        button { margin: 5px; padding: 8px 16px; cursor: pointer; background: #007acc; color: white; border: none; }
        button:hover { background: #005a9e; }
        #log { height: 400px; overflow-y: scroll; background: #000; padding: 10px; font-size: 12px; }
        .log-entry { margin: 2px 0; border-bottom: 1px solid #111; }
        .sent { color: #2ecc71; }
        .received { color: #f39c12; }
        .error { color: #e74c3c; }
        .status { color: #9b59b6; }
    </style>
</head>
<body>
    <h1>🧪 GFP 协议测试面板</h1>
    
    <div class="section">
        <h2>连接控制</h2>
        <button onclick="connect()">连接服务器</button>
        <button onclick="disconnect()">断开连接</button>
        <span id="status" class="status">未连接</span>
    </div>

    <div class="section">
        <h2>用户协议</h2>
        <button onclick="login()">LOGIN (10001)</button>
        <button onclick="selectRole()">SELECT_ROLE (10005)</button>
        <button onclick="enterGame()">ENTER_GAME (10006)</button>
    </div>

    <div class="section">
        <h2>移动协议</h2>
        <button onclick="move()">MOVE (1001)</button>
        <button onclick="stand()">STAND (1002)</button>
        <button onclick="jump()">JUMP (1003)</button>
        <button onclick="pvpMove()">PVP_MOVE (1004)</button>
    </div>

    <div class="section">
        <h2>地图切换</h2>
        <button onclick="mapSwitch(1001)">新手村</button>
        <button onclick="mapSwitch(1002)">竹林深处</button>
        <button onclick="mapSwitch(1003)">虎口山谷</button>
        <button onclick="mapSwitch(1004)">蛇影洞</button>
        <button onclick="mapSwitch(1005)">竞技场</button>
    </div>

    <div class="section">
        <h2>战斗协议</h2>
        <button onclick="useSkill()">ACTION_SKILL (2004)</button>
        <button onclick="bruse()">ACTION_BRUISE (2003)</button>
        <button onclick="buffAdd()">BUFF 添加 (2005)</button>
        <button onclick="buffRemove()">BUFF 移除 (2005)</button>
    </div>

    <div class="section">
        <h2>物品协议</h2>
        <button onclick="itemPickup()">ITEM_PICKUP (3001)</button>
    </div>

    <div class="section">
        <button onclick="clearLog()">清空日志</button>
    </div>

    <div id="log"></div>

    <script>
        let ws = null;
        let myUserId = 0;

        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logDiv.insertBefore(entry, logDiv.firstChild);
        }

        function connect() {
            ws = new WebSocket('ws://localhost:8080');
            log('正在连接...', 'status');

            ws.onopen = () => {
                log('已连接服务器', 'status');
                document.getElementById('status').textContent = '已连接';
                document.getElementById('status').style.color = '#2ecc71';
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    const cmd = data.cmd;
                    log(`📥 收到: cmd=${cmd}, data=${JSON.stringify(data).substr(0, 200)}`, 'received');
                } catch {
                    log(`📥 ${event.data}`, 'received');
                }
            };

            ws.onclose = () => {
                log('连接断开', 'status');
                document.getElementById('status').textContent = '未连接';
                document.getElementById('status').style.color = '#f39c12';
            };

            ws.onerror = (err) => {
                log('连接错误', 'error');
            };
        }

        function disconnect() {
            if (ws) ws.close();
        }

        function send(cmd, data = {}) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('未连接服务器', 'error');
                return;
            }
            data.cmd = cmd;
            ws.send(JSON.stringify(data));
            log(`📤 发送: cmd=${cmd}, data=${JSON.stringify(data)}`, 'sent');
        }

        // 用户协议
        function login() {
            send(10001, {
                username: 'tester',
                password: '123456',
                session: 'test-session-123',
                roleTime: Date.now()
            });
        }
        function selectRole() {
            send(10005, { roleId: 1 });
        }
        function enterGame() {
            send(10006, {});
        }

        // 移动协议
        function move() {
            send(1001, { mapId: 1001, pos: {x: 100, y: 200}, speed: 150, moveType: 1 });
        }
        function stand() {
            send(1002, { mapId: 1001, pos: {x: 150, y: 250}, direction: 1 });
        }
        function jump() {
            send(1003, { pos: {x: 200, y: 100} });
        }
        function pvpMove() {
            send(1004, { mapId: 1001, pos: {x: 300, y: 300}, speed: 200, moveType: 2, timestamp: Date.now() });
        }

        // 地图切换
        function mapSwitch(mapId) {
            send(14005, { targetMapId: mapId });
        }

        // 战斗协议
        function useSkill() {
            send(2004, { skillId: 1002, skillLv: 3, pos: {x: 400, y: 400}, targetId: 1, direction: 1 });
        }
        function bruse() {
            send(2003, { atkerID: 2, userID: 1, decHP: 100, hp: 900, skillID: 1001, type: 1, hitCount: 1 });
        }
        function buffAdd() {
            send(2005, { userID: 1, buffID: 1001, buffLv: 5, buffType: 1, duration: 300, state: 1 });
        }
        function buffRemove() {
            send(2005, { userID: 1, buffID: 1001, buffLv: 5, buffType: 1, duration: 0, state: 2 });
        }

        // 物品协议
        function itemPickup() {
            send(3001, {
                items: [
                    { itemId: 10001, count: 1 },
                    { itemId: 20001, count: 5 }
                ]
            });
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
    </script>
</body>
</html>
